<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>القهوة التركية - شركة القهوة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script defer src="bundle.js"></script></head>
  <body class="product-page turkish">
    <main class="container my-5">
      <h2>القهوة التركية</h2>
      <p>
        القهوة التركية تُعد باستخدام حبوب البن المطحونة ناعمًا جدًا، دون تصفية. مشهورة في العالم العربي والبلقان، وتقدم عادةً مع الحلوى.
      </p>

      <!-- ✅ صور القهوة التركية -->
      <div id="turkishCarousel" class="carousel slide mb-4" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="https://unsplash.com/photos/7X96RNhpxBc/download?force=true" class="d-block w-100" alt="تركية 1" />
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com/photos/2mZWydjhULk/download?force=true" class="d-block w-100" alt="تركية 2" />
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com/photos/SmQiXULsE0E/download?force=true" class="d-block w-100" alt="تركية 3" />
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#turkishCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#turkishCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>

      <button class="btn btn-success">أضف إلى السلة</button>
    </main>
  </body>
</html>
