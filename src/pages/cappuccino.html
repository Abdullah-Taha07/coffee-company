<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>كابتشينو - شركة القهوة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body class="product-page">
    <main class="container my-5">
      <h2>كابتشينو</h2>
      <p>
        الكابتشينو هو نوع من القهوة الإيطالية يتميز بالحليب والرغوة الغنية. يحتوي كل كوب على 300 سعرة حرارية تقريبًا.
      </p>

      <!-- ✅ صور المنتج -->
      <div id="cappuccinoCarousel" class="carousel slide mb-4" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="https://unsplash.com/photos/WJzyp64NmyA/download?force=true" class="d-block w-100" alt="كابتشينو 1" />
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com/photos/J-4ozdP9EQ0/download?force=true" class="d-block w-100" alt="كابتشينو 2" />
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com/photos/TTskdZvyfns/download?force=true" class="d-block w-100" alt="كابتشينو 3" />
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#cappuccinoCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#cappuccinoCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>

      <button class="btn btn-success">أضف إلى السلة</button>
      
      <!-- تقييمات وتعليقات -->
      <section class="mt-5">
            <h4>تقييمات المستخدمين</h4>
            
            <!-- ⭐ تقييمات -->
            <div id="reviews-list" class="mb-4">
                <!-- يتم تعبئة المراجعات عبر JS -->
            </div>

            <!-- 📥 نموذج إضافة تقييم -->
            <form id="review-form">
                <div class="mb-3">
                    <label for="name" class="form-label">اسمك:</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label for="review" class="form-label">رأيك:</label>
                    <textarea class="form-control" id="review" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="rating" class="form-label">تقييمك:</label>
                    <select id="rating" class="form-select" required>
                        <option value="5">5 نجوم</option>
                        <option value="4">4 نجوم</option>
                        <option value="3">3 نجوم</option>
                        <option value="2">2 نجمة</option>
                        <option value="1">1 نجمة</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">إرسال</button>
            </form>
        </section>
    </main>
  </body>
</html>
