<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>القهوة العادية - شركة القهوة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script defer src="bundle.js"></script></head>
  <body class="product-page coffee">
    <main class="container my-5">
      <h2>القهوة العادية</h2>
      <p>
        القهوة مشروب يعد من بذور البن المحمصة، وينمو في أكثر من 70 بلدًا، وتُعد من أكثر المشروبات استهلاكًا في العالم. تحتوي على الكافيين الذي يمنح تأثيرًا منبهًا.
      </p>

      <!-- ✅ صور القهوة -->
      <div id="coffeeCarousel" class="carousel slide mb-4" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="https://unsplash.com/photos/tXYg4Zx7kSU/download?force=true" class="d-block w-100" alt="قهوة 1" />
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com/photos/Am2kjOEKADs/download?force=true" class="d-block w-100" alt="قهوة 2" />
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com/photos/g0fpI-Dq-kQ/download?force=true" class="d-block w-100" alt="قهوة 3" />
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#coffeeCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#coffeeCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>

      <button class="btn btn-success">أضف إلى السلة</button>
    </main>
  </body>
</html>
